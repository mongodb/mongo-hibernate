junit.jupiter.params.displayname.default=[{index}]{displayName}[{argumentSetNameOrArgumentsWithNames}]

# Integration tests run concurrently within a single JVM: test classes run concurrently, but methods within a class
# stay on one thread, so each class's own database (assigned by MongoExtension) is created, used, and dropped
# sequentially. Fail-point and other mongod-global-state tests are @Isolated so they never run concurrently with
# anything.
junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=concurrent
junit.jupiter.execution.parallel.config.strategy=fixed
junit.jupiter.execution.parallel.config.fixed.parallelism=6
